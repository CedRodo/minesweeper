<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="fonts.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" media="screen and (orientation:portrait) and (max-width: 480px)" href="./style-portrait_mobile.css">
    <link rel="stylesheet" type="text/css" media="screen and (orientation:landscape) and (max-height: 480px)" href="./style-landscape_mobile.css">
    <script src="./script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div class="game_options-container">
        <div class="game_option game_option_difficulty">
            <button type="button" class="option_difficulty option_difficulty_beginner" data-type="level" data-level="beginner">Beginner</button>
            <button type="button" class="option_difficulty option_difficulty_intermediate" data-type="level" data-level="intermediate">Intermediate</button>
            <button type="button" class="option_difficulty option_difficulty_expert" data-type="level" data-level="expert">Expert</button>
        </div>
    </div>
    <div class="game_reset-container">
        <button type="button" id="game_reset">Reset</button>
    </div>
    <div class="minesweeper-container">
        <div class="grid-container">
            <div class="top-container">
                <div class="game_info-container game_info_mines-container">
                    <div class="game_info game_info_mines game_info_mines_1">8
                        <div class="game_info_number game_info_mines_number game_info_mines_number_1"></div>
                    </div>
                    <div class="game_info game_info_mines game_info_mines_2">8
                        <div class="game_info_number game_info_mines_number game_info_mines_number_2"></div>
                    </div>
                    <div class="game_info game_info_mines game_info_mines_3">8
                        <div class="game_info_number game_info_mines_number game_info_mines_number_3"></div>
                    </div>
                </div>
                <div id="game_start">
                    <img class="game_icon game_top_icon" src="./assets/img/icons/start.png" alt="start" data-icon="start" draggable="false">
                </div>
                <div class="game_info-container game_info_time-container">
                    <div class="game_info game_info_time game_info_time_1">8
                        <div class="game_info_number game_info_time_number game_info_time_number_1"></div>
                    </div>
                    <div class="game_info game_info_time game_info_time_2">8
                        <div class="game_info_number game_info_time_number game_info_time_number_2"></div>
                    </div>
                    <div class="game_info game_info_time game_info_time_3">8
                        <div class="game_info_number game_info_time_number game_info_time_number_3"></div>
                    </div>
                </div>
            </div>
            <div class="grid"></div>
        </div>
    </div>
</body>
</html>
